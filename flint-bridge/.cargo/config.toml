[target.xtensa-esp32-none-elf]
runner = "espflash flash --monitor --baud 921600 --port /dev/cu.usbserial-0001"

[build]
target = "xtensa-esp32-none-elf"

[unstable]
build-std = ["core"]

# TRACE so debug mode can reach trace-level logs; the firmware gates emission at
# runtime with log::set_max_level (Off in binary mode, Trace in debug mode).
[env]
ESP_LOG = "TRACE"
